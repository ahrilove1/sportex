<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | SPORTEX</title>
<meta name="description" content="SPORTEX outdoor resort wear product details. Premium lightweight, breathable apparel with UPF 50+ protection.">
<meta property="og:title" content="Product | SPORTEX">
<meta property="og:description" content="Premium outdoor resort wear. Lightweight, breathable, UPF 50+.">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.svg">
<link rel="preconnect" href="https://images.unsplash.com">
<link rel="preconnect" href="https://raw.githubusercontent.com">
<style>
  :root {
    --navy: #1a1f2e; --navy-light: #2a3348;
    --white: #ffffff; --off-white: #f5f4f1;
    --gray: #6b7280; --gray-light: #e5e7eb;
    --accent: #d4944e; --accent-dark: #b87830;
    --text: #1f2937;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--white); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    background: var(--navy); color: var(--white);
    text-align: center; padding: 8px 16px;
    font-size: 13px; letter-spacing: 0.5px;
  }

  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--gray-light);
    padding: 0 40px; display: flex; justify-content: space-between;
    align-items: center; height: 64px;
  }
  .nav-logo {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    color: var(--navy); text-decoration: none;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--text); font-size: 14px;
    font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent-dark); }
  .nav-links a.active { color: var(--accent-dark); border-bottom: 2px solid var(--accent-dark); padding-bottom: 4px; }
  .lang-toggle button {
    background: none; border: 1px solid var(--gray-light);
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    color: var(--gray); letter-spacing: 0.5px; transition: all 0.2s;
  }
  .lang-toggle button:hover { border-color: var(--accent-dark); color: var(--accent-dark); }

  .breadcrumb {
    max-width: 1200px; margin: 0 auto; padding: 20px 40px;
    font-size: 13px; color: var(--gray);
  }
  .breadcrumb a { color: var(--gray); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent-dark); }
  .breadcrumb span { color: var(--text); }

  .product-detail {
    max-width: 1200px; margin: 0 auto; padding: 0 40px 80px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
  }

  .gallery {}
  .gallery-main {
    width: 100%; aspect-ratio: 3/4; overflow: hidden; background: var(--off-white);
    border-radius: 2px;
  }
  .gallery-main img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.3s ease;
  }
  .gallery-thumbs {
    display: flex; gap: 12px; margin-top: 16px;
  }
  .gallery-thumbs button {
    width: 80px; height: 100px; border: 2px solid transparent;
    border-radius: 2px; overflow: hidden; cursor: pointer;
    padding: 0; background: var(--off-white);
    transition: border-color 0.2s;
  }
  .gallery-thumbs button.active { border-color: var(--accent-dark); }
  .gallery-thumbs button img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .info {}
  .info .p-cat {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent-dark); font-weight: 600; margin-bottom: 8px;
  }
  .info h1 {
    font-size: clamp(26px, 4vw, 36px); font-weight: 700;
    color: var(--navy); letter-spacing: 2px; margin-bottom: 8px;
  }
  .info .p-tags {
    font-size: 15px; color: var(--gray); margin-bottom: 32px; letter-spacing: 0.5px;
  }
  .info .p-desc {
    font-size: 15px; color: var(--text); line-height: 1.8; margin-bottom: 32px;
  }

  .info .specs {
    border-top: 1px solid var(--gray-light); padding-top: 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px 32px;
  }
  .spec-item {}
  .spec-item .label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--gray); margin-bottom: 4px;
  }
  .spec-item .value { font-size: 14px; color: var(--text); }

  .info .features-list {
    border-top: 1px solid var(--gray-light); padding-top: 24px; margin-top: 24px;
  }
  .features-list h3 {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--navy); margin-bottom: 16px;
  }
  .features-list ul {
    list-style: none; display: grid; gap: 10px;
  }
  .features-list ul li {
    font-size: 14px; color: var(--text); padding-left: 20px;
    position: relative;
  }
  .features-list ul li::before {
    content: ''; position: absolute; left: 0; top: 9px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }

  .back-link {
    text-align: center; padding: 0 40px 80px;
  }
  .back-link a {
    display: inline-block; padding: 14px 36px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; text-decoration: none;
    color: var(--navy); border: 2px solid var(--navy);
    transition: all 0.3s;
  }
  .back-link a:hover { background: var(--navy); color: var(--white); }

  .footer { background: var(--navy); color: var(--white); padding: 64px 40px 40px; }
  .footer-grid {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .footer-col h4 { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .footer-col p, .footer-col a { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 2.2; text-decoration: none; display: block; }
  .footer-col a:hover { color: var(--white); }
  .footer-brand { font-size: 22px; font-weight: 700; letter-spacing: 4px; margin-bottom: 12px; }
  .footer-bottom {
    max-width: 1100px; margin: 0 auto; padding-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: rgba(255,255,255,0.45);
  }

  .not-found { text-align: center; padding: 120px 40px; }
  .not-found h2 { font-size: 28px; color: var(--navy); margin-bottom: 16px; }
  .not-found p { color: var(--gray); margin-bottom: 32px; }
</style>
</head>
<body>

<header id="siteNav"></header>

<div class="breadcrumb" id="breadcrumb">
  <a href="index.html">Home</a> / <a href="men.html" id="bcCat">Collection</a> / <span id="bcName">Product</span>
</div>

<section id="productSection"></section>

<div class="back-link" id="backLink" style="padding:20px 40px 0">
  <a href="men.html">&larr; Back to Collection</a>
</div>

<footer id="siteFooter" class="footer"></footer>

<script src="products.js" defer></script>
<script src="common.js" defer></script>
<script src="lang.js" defer></script>
<script>
document.addEventListener("DOMContentLoaded", function() {

(async () => {
await Promise.all([productsLoaded, companyLoaded]);
renderNav(); // product pages don't highlight a specific nav item
renderFooter();

const params = new URLSearchParams(location.search);
const productId = params.get('id');
const product = getProductById(productId);
const section = document.getElementById('productSection');

if (!product) {
  section.innerHTML = `
    <div class="not-found">
      <h2 data-lkey="pdNotFoundTitle">Product Not Found</h2>
      <p data-lkey="pdNotFoundText">The product you are looking for does not exist or has been removed.</p>
      <a href="index.html" data-lkey="pdNotFoundBtn" style="display:inline-block;padding:14px 36px;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:var(--navy);border:2px solid var(--navy);">Back to Home</a>
    </div>
  `;
  document.getElementById('backLink').style.display = 'none';
} else {
  document.title = product.name + ' | SPORTEX';

  const catName = product.category === 'men' ? 'Men\'s Collection' : 'Women\'s Collection';
  const catPage = product.category === 'men' ? (product.subcat ? 'men-'+product.subcat+'.html' : 'men.html') : 'women.html';
  document.getElementById('bcCat').href = catPage;
  document.getElementById('bcCat').textContent = catName;
  document.getElementById('bcName').textContent = product.name;
  document.getElementById('backLink').querySelector('a').href = catPage;

  let galleryHTML = '';
  if (product.images && product.images.length > 0) {
    galleryHTML = `
      <div class="gallery">
        <div class="gallery-main">
          <img src="${product.images[0] || 'images/placeholder.svg'}" alt="${product.name}" id="mainImg" onerror="this.onerror=null;this.src='images/placeholder.svg'">
        </div>
        ${product.images.length > 1 ? `
          <div class="gallery-thumbs">
            ${product.images.map((img, i) => `
              <button class="${i === 0 ? 'active' : ''}" data-img="${img}">
                ${imgTag(img, product.name + ' view ' + (i + 1), '', 'gallery')}
              </button>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  section.innerHTML = `
    <div class="product-detail">
      ${galleryHTML}
      <div class="info">
        <div class="p-cat">${catName}</div>
        <h1>${product.name}</h1>
        <div class="p-sku" style="font-size:12px;color:var(--gray);letter-spacing:.5px;margin-bottom:8px">${product.id}</div>
        <div class="p-desc">${product.description}</div>
        <div class="specs">
          <div class="spec-item">
            <div class="label" data-lkey="pdFabric">Fabric</div>
            <div class="value">${product.fabric}</div>
          </div>
          <div class="spec-item">
            <div class="label" data-lkey="pdSizes">Available Sizes</div>
            <div class="value">${product.sizes}</div>
          </div>
          <div class="spec-item">
            <div class="label" data-lkey="pdMOQ">MOQ</div>
            <div class="value">${product.moq}</div>
          </div>
        </div>
        <div class="features-list">
          <h3 data-lkey="pdFeatures">Key Features</h3>
          <ul>
            ${product.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>
  `;

  // Re-apply language to handle dynamic content
  applyLang(currentLang);

  // Gallery thumbnail switching
  document.querySelectorAll('.gallery-thumbs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('mainImg').src = btn.dataset.img;
      document.querySelectorAll('.gallery-thumbs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}
})();

});
</script>
</body>
</html>
