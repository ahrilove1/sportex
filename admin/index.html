<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTEX Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: #1a1f2e; }
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column;
    }
    .login-box {
      background: #fff; padding: 48px 40px; border-radius: 4px;
      text-align: center; max-width: 380px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-box .logo {
      font-size: 28px; font-weight: 700; letter-spacing: 4px;
      color: #1a1f2e; margin-bottom: 8px;
    }
    .login-box .sub {
      font-size: 13px; color: #6b7280; margin-bottom: 28px;
    }
    .login-box input {
      width: 100%; padding: 12px 16px; font-size: 15px;
      border: 1px solid #e5e7eb; border-radius: 2px; outline: none;
      text-align: center; letter-spacing: 1px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #d4944e; }
    .login-box button {
      width: 100%; margin-top: 16px; padding: 12px;
      background: #1a1f2e; color: #fff; border: none;
      font-size: 14px; font-weight: 600; letter-spacing: 2px;
      cursor: pointer; border-radius: 2px; transition: background 0.2s;
    }
    .login-box button:hover { background: #2a3348; }
    .login-box .error {
      color: #dc2626; font-size: 13px; margin-top: 12px; display: none;
    }
    #cms-root { height: 100vh; display: none; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">SPORTEX</div>
    <div class="sub">Content Manager</div>
    <input type="password" id="pw-input" placeholder="Enter password" autofocus>
    <button id="pw-btn">UNLOCK</button>
    <div class="error" id="pw-error">Incorrect password</div>
  </div>
</div>

<div id="cms-root"></div>

<script>
(function() {
  var PASS_HASH = '61e30afec88a4c8327301d32b87b23d68d9a5dd780b060b776532d4026547734';
  var SESSION_KEY = 'sportex_admin_pw';
  var TOKEN_KEY = 'sportex_gh_token';

  // ── Step 1: Handle OAuth redirect return ──
  var hash = window.location.hash;
  if (hash.indexOf('access_token=') !== -1) {
    var token = hash.split('access_token=')[1].split('&')[0];
    sessionStorage.setItem(TOKEN_KEY, token);
    sessionStorage.setItem(SESSION_KEY, '1');
    window.location.hash = '';
    window.location.replace('/admin/');
    return;
  }

  // ── Step 2: Inject token into Decap CMS's IndexedDB BEFORE loading CMS ──
  var storedToken = sessionStorage.getItem(TOKEN_KEY);
  if (storedToken) {
    injectTokenAndStart(storedToken);
    return;
  }

  // ── Step 3: Already authed? Go straight to CMS ──
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    startCMS();
    return;
  }

  // ── Step 4: Password gate ──
  document.getElementById('pw-btn').addEventListener('click', verifyPassword);
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyPassword();
  });

  async function sha256(text) {
    var encoder = new TextEncoder();
    var data = encoder.encode(text);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  async function verifyPassword() {
    var input = document.getElementById('pw-input').value;
    if (!input) return;
    var h = await sha256(input);
    if (h === PASS_HASH) {
      sessionStorage.setItem(SESSION_KEY, '1');
      startCMS();
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  // ── Inject token into IndexedDB (matching Decap CMS's localForage format) ──
  function injectTokenAndStart(token) {
    var req = indexedDB.open('decap-cms', 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('github')) {
        db.createObjectStore('github');
      }
    };
    req.onsuccess = async function(e) {
      var db = e.target.result;
      // Ensure store exists
      if (!db.objectStoreNames.contains('github')) {
        db.close();
        var req2 = indexedDB.open('decap-cms', db.version + 1);
        req2.onupgradeneeded = function(ev) {
          ev.target.result.createObjectStore('github');
        };
        req2.onsuccess = function(ev2) {
          writeToken(ev2.target.result, token);
        };
      } else {
        writeToken(db, token);
      }
    };
    req.onerror = function() {
      // IndexedDB failed, fallback: override fetch globally
      overrideFetch(token);
      sessionStorage.removeItem(TOKEN_KEY);
      startCMS();
    };
  }

  function writeToken(db, token) {
    try {
      var tx = db.transaction('github', 'readwrite');
      var store = tx.objectStore('github');
      // Decap CMS stores user data using localForage; the key is 'github_user'
      store.put({
        token: token,
        name: 'SPORTEX Admin',
        email: 'admin@sportexproduction.com',
        avatar_url: '',
        html_url: 'https://github.com/ahrilove1'
      }, 'github_user');
      tx.oncomplete = function() {
        db.close();
        sessionStorage.removeItem(TOKEN_KEY);
        overrideFetch(token); // belt-and-suspenders
        startCMS();
      };
      tx.onerror = function() {
        db.close();
        overrideFetch(token);
        sessionStorage.removeItem(TOKEN_KEY);
        startCMS();
      };
    } catch(e) {
      db.close();
      overrideFetch(token);
      sessionStorage.removeItem(TOKEN_KEY);
      startCMS();
    }
  }

  function overrideFetch(token) {
    var _fetch = window.fetch;
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && (url.indexOf('api.github.com') !== -1)) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        if (opts.headers instanceof Headers) {
          opts.headers.set('Authorization', 'Bearer ' + token);
        } else {
          opts.headers['Authorization'] = 'Bearer ' + token;
        }
      }
      return _fetch.call(window, url, opts);
    };
  }

  // ── Start CMS ──
  function startCMS() {
    document.getElementById('login-screen').style.display = 'none';
    var cmsRoot = document.getElementById('cms-root');
    cmsRoot.style.display = 'block';

    // Override window.open to use redirect instead of popup (fixes popup blocker)
    var _origOpen = window.open;
    window.open = function(url, target, features) {
      if (typeof url === 'string' && url.indexOf('/api/auth') !== -1) {
        window.location.href = url;
        return null;
      }
      return _origOpen.call(window, url, target, features);
    };

    var script = document.createElement('script');
    script.src = 'https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js';
    script.onload = function() {
      try { CMS.registerPreviewStyle('/admin/preview.css'); } catch(e) {}
    };
    document.body.appendChild(script);
  }
})();
</script>
</body>
</html>
