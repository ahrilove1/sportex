<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTEX Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: #1a1f2e; }
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column;
    }
    .login-box {
      background: #fff; padding: 48px 40px; border-radius: 4px;
      text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-box .logo {
      font-size: 28px; font-weight: 700; letter-spacing: 4px;
      color: #1a1f2e; margin-bottom: 8px;
    }
    .login-box .sub {
      font-size: 13px; color: #6b7280; margin-bottom: 28px;
    }
    .login-box input, .login-box textarea {
      width: 100%; padding: 12px 16px; font-size: 14px;
      border: 1px solid #e5e7eb; border-radius: 2px; outline: none;
      text-align: center; letter-spacing: 1px;
      transition: border-color 0.2s; margin-bottom: 12px;
    }
    .login-box input:focus, .login-box textarea:focus { border-color: #d4944e; }
    .login-box button {
      width: 100%; padding: 12px;
      background: #1a1f2e; color: #fff; border: none;
      font-size: 14px; font-weight: 600; letter-spacing: 2px;
      cursor: pointer; border-radius: 2px; transition: background 0.2s;
    }
    .login-box button:hover { background: #2a3348; }
    .login-box .error {
      color: #dc2626; font-size: 13px; margin-top: 8px; display: none;
    }
    .login-box .hint {
      font-size: 11px; color: #9ca3af; margin-top: 8px; line-height: 1.5;
    }
    .login-box .hint a { color: #d4944e; }
    .login-box .success-msg {
      color: #16a34a; font-size: 13px; margin-top: 8px; display: none;
    }
    #cms-root { height: 100vh; display: none; }
    #step-pw { display: block; }
    #step-token { display: none; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">

    <!-- Step 1: Password -->
    <div id="step-pw">
      <div class="logo">SPORTEX</div>
      <div class="sub">Content Manager</div>
      <input type="password" id="pw-input" placeholder="Enter password" autofocus>
      <button id="pw-btn">UNLOCK</button>
      <div class="error" id="pw-error">Incorrect password</div>
    </div>

    <!-- Step 2: GitHub PAT (first time only) -->
    <div id="step-token">
      <div class="logo">SPORTEX</div>
      <div class="sub">GitHub Access Token</div>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autofocus>
      <button id="token-btn">SAVE & ENTER</button>
      <div class="error" id="token-error">Invalid token — must have <b>repo</b> scope</div>
      <div class="success-msg" id="token-ok">Token validated! Starting editor...</div>
      <div class="hint">
        Need a token?<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=SPORTEX%20CMS" target="_blank">
          Click here to create one →</a><br>
        Check <b>repo</b> scope, generate, then paste above.
      </div>
    </div>

  </div>
</div>

<div id="cms-root"></div>

<script>
(function() {
  var PASS_HASH = '61e30afec88a4c8327301d32b87b23d68d9a5dd780b060b776532d4026547734';
  var SESSION_KEY = 'sportex_admin_pw';
  var TOKEN_KEY = 'sportex_gh_token';

  // ── Already authenticated? ──
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    var saved = sessionStorage.getItem(TOKEN_KEY);
    if (saved) {
      injectToken(saved);
      startCMS();
    } else {
      showTokenStep();
    }
    return;
  }

  // ── Step 1: Password ──
  document.getElementById('pw-btn').addEventListener('click', verifyPassword);
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyPassword();
  });

  async function sha256(text) {
    var encoder = new TextEncoder();
    var data = encoder.encode(text);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  async function verifyPassword() {
    var input = document.getElementById('pw-input').value;
    if (!input) return;
    var h = await sha256(input);
    if (h === PASS_HASH) {
      sessionStorage.setItem(SESSION_KEY, '1');
      var saved = sessionStorage.getItem(TOKEN_KEY);
      if (saved) {
        injectToken(saved);
        startCMS();
      } else {
        showTokenStep();
      }
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  // ── Step 2: GitHub Token ──
  function showTokenStep() {
    document.getElementById('step-pw').style.display = 'none';
    document.getElementById('step-token').style.display = 'block';
    document.getElementById('token-input').focus();

    document.getElementById('token-btn').addEventListener('click', validateToken);
    document.getElementById('token-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') validateToken();
    });
  }

  async function validateToken() {
    var token = document.getElementById('token-input').value.trim();
    if (!token) return;

    document.getElementById('token-btn').disabled = true;
    document.getElementById('token-error').style.display = 'none';

    // Test token against GitHub API
    try {
      var resp = await fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (resp.ok) {
        var user = await resp.json();
        // Also check repo access
        var repoResp = await fetch('https://api.github.com/repos/ahrilove1/sportex', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (repoResp.ok) {
          sessionStorage.setItem(TOKEN_KEY, token);
          document.getElementById('token-ok').style.display = 'block';
          injectToken(token);
          setTimeout(startCMS, 400);
          return;
        }
      }
    } catch(e) {}

    document.getElementById('token-btn').disabled = false;
    document.getElementById('token-error').style.display = 'block';
    document.getElementById('token-input').value = '';
    document.getElementById('token-input').focus();
  }

  // ── Inject token globally ──
  function injectToken(token) {
    var _fetch = window.fetch;
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.indexOf('api.github.com') !== -1) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        if (opts.headers instanceof Headers) {
          opts.headers.set('Authorization', 'Bearer ' + token);
        } else {
          opts.headers['Authorization'] = 'Bearer ' + token;
        }
      }
      return _fetch.call(window, url, opts);
    };
  }

  // ── Start CMS ──
  function startCMS() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('cms-root').style.display = 'block';

    // Override window.open → redirect for any OAuth attempts
    var _origOpen = window.open;
    window.open = function(url, target, features) {
      if (typeof url === 'string' && url.indexOf('/api/auth') !== -1) {
        window.location.href = url;
        return null;
      }
      return _origOpen.call(window, url, target, features);
    };

    // Load localForage first, inject token into Decap CMS's expected storage
    var lfScript = document.createElement('script');
    lfScript.src = 'https://unpkg.com/localforage@1.10.0/dist/localforage.min.js';
    lfScript.onload = function() {
      var token = sessionStorage.getItem(TOKEN_KEY);
      if (token) {
        // Use the same instance config that Decap CMS GitHub backend uses
        localforage.createInstance({ name: 'decap-cms', storeName: 'github' })
          .then(function(store) {
            return store.setItem('github_user', {
              token: token,
              name: 'SPORTEX Admin',
              email: 'admin@sportexproduction.com',
              avatar_url: '',
              html_url: 'https://github.com/ahrilove1',
              login: 'ahrilove1'
            });
          })
          .then(function() {
            // Now load Decap CMS — it will find the stored user
            loadDecapCMS();
          })
          .catch(function() {
            loadDecapCMS(); // Fallback
          });
      } else {
        loadDecapCMS();
      }
    };
    document.body.appendChild(lfScript);
  }

  function loadDecapCMS() {
    var script = document.createElement('script');
    script.src = 'https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js';
    script.onload = function() {
      try { CMS.registerPreviewStyle('/admin/preview.css'); } catch(e) {}
    };
    document.body.appendChild(script);
  }
})();
</script>
</body>
</html>
