<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTEX Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: #1a1f2e; }
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column;
    }
    .login-box {
      background: #fff; padding: 48px 40px; border-radius: 4px;
      text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-box .logo { font-size: 28px; font-weight: 700; letter-spacing: 4px; color: #1a1f2e; margin-bottom: 8px; }
    .login-box .sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 16px; font-size: 14px;
      border: 1px solid #e5e7eb; border-radius: 2px; outline: none;
      text-align: center; margin-bottom: 12px;
    }
    .login-box input:focus { border-color: #d4944e; }
    .login-box button {
      width: 100%; padding: 12px; background: #1a1f2e; color: #fff; border: none;
      font-size: 14px; font-weight: 600; letter-spacing: 2px; cursor: pointer; border-radius: 2px;
    }
    .login-box button:hover { background: #2a3348; }
    .login-box .error { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
    .login-box .msg { font-size: 12px; color: #6b7280; margin-top: 8px; }
    .login-box .msg a { color: #d4944e; }
    .login-box .green { color: #16a34a; display: none; }
    #cms-root { height: 100vh; display: none; }
    #step-token { display: none; }
  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div id="step-pw">
      <div class="logo">SPORTEX</div>
      <div class="sub">Content Manager</div>
      <input type="password" id="pw-input" placeholder="Enter password" autofocus>
      <button id="pw-btn">UNLOCK</button>
      <div class="error" id="pw-error">Incorrect password</div>
    </div>
    <div id="step-token">
      <div class="logo">SPORTEX</div>
      <div class="sub">GitHub Access Token</div>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autofocus>
      <button id="token-btn">SAVE & ENTER</button>
      <div class="error" id="token-error">Invalid token — needs <b>repo</b> scope</div>
      <div class="green" id="token-ok">Token OK! Loading editor…</div>
      <div class="msg">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=SPORTEX%20CMS" target="_blank">
          Create a token →</a> (check <b>repo</b>, generate, paste)
      </div>
    </div>
  </div>
</div>
<div id="cms-root"></div>

<script>
(function(){
var PASS_HASH = '61e30afec88a4c8327301d32b87b23d68d9a5dd780b060b776532d4026547734';
var LS_KEY = 'spex_gh_token';
var PW_KEY = 'spex_pw';
var token = localStorage.getItem(LS_KEY);

// ── Already authenticated? Skip to CMS ──
if (token && localStorage.getItem(PW_KEY) === '1') {
  injectFetch(token);
  startCMS();
  return;
}

// ── Step 1: Password ──
document.getElementById('pw-btn').onclick = checkPw;
document.getElementById('pw-input').onkeydown = function(e) { if(e.key==='Enter') checkPw(); };

async function sha256(t) {
  var d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(d)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

async function checkPw() {
  var v = document.getElementById('pw-input').value;
  if (!v) return;
  if (await sha256(v) === PASS_HASH) {
    localStorage.setItem(PW_KEY, '1');
    document.getElementById('pw-error').style.display = 'none';
    document.getElementById('step-pw').style.display = 'none';
    document.getElementById('step-token').style.display = 'block';
    document.getElementById('token-input').focus();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

// ── Step 2: Token ──
document.getElementById('token-btn').onclick = checkToken;
document.getElementById('token-input').onkeydown = function(e) { if(e.key==='Enter') checkToken(); };

async function checkToken() {
  var t = document.getElementById('token-input').value.trim();
  if (!t) return;
  document.getElementById('token-btn').disabled = true;
  document.getElementById('token-error').style.display = 'none';
  try {
    var r = await fetch('https://api.github.com/repos/ahrilove1/sportex', {
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (r.ok) {
      localStorage.setItem(LS_KEY, t);
      injectFetch(t);
      document.getElementById('token-ok').style.display = 'block';
      startCMS();
      return;
    }
  } catch(e) {}
  document.getElementById('token-btn').disabled = false;
  document.getElementById('token-error').style.display = 'block';
}

function injectFetch(t) {
  var _f = window.fetch;
  window.fetch = function(u, o) {
    if (typeof u === 'string' && u.indexOf('api.github.com') !== -1) {
      o = o || {}; o.headers = o.headers || {};
      if (o.headers instanceof Headers) o.headers.set('Authorization', 'Bearer ' + t);
      else o.headers['Authorization'] = 'Bearer ' + t;
    }
    return _f.call(window, u, o);
  };
}

function startCMS() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('cms-root').style.display = 'block';

  // Minimal window.open override: intercept popup, complete handshake, then auth
  var _origOpen = window.open;
  window.open = function(url, target, features) {
    if (typeof url === 'string' && url.indexOf('/api/auth') !== -1) {
      var tok = localStorage.getItem(LS_KEY);
      var fakeWin = {
        close: function(){},
        focus: function(){},
        closed: false,
        location: { href: '' },
        postMessage: function(data, origin) {
          // Main window is sending us (popup) the initial handshake payload
          console.log('[POPUP] received handshake from main:', data);
          // Respond back to main window with a handshake acknowledgment
          setTimeout(function() {
            window.postMessage('handshake:' + JSON.stringify(data), '*');
            console.log('[POPUP] sent handshake back');
            // Now send the authorization
            setTimeout(function() {
              var authData = 'authorization:github:success:' + JSON.stringify({token: tok, provider: 'github'});
              console.log('[POPUP] sending auth data');
              window.postMessage(authData, '*');
            }, 200);
          }, 200);
        }
      };
      return fakeWin;
    }
    return _origOpen.call(window, url, target, features);
  };

  // Load Decap CMS
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js';
  s.onload = function() {
    try { CMS.registerPreviewStyle('/admin/preview.css'); } catch(e) {}
  };
  document.body.appendChild(s);
}
})();
</script>
</body>
</html>
