backend:
  name: github
  repo: ahrilove1/sportex
  branch: main
  base_url: https://sportexproduction.com
  auth_endpoint: /api/auth
  squash_merges: true
  commit_messages:
    create: "content: create {{collection}} - {{slug}}"
    update: "content: update {{collection}} - {{slug}}"
    delete: "content: delete {{collection}} - {{slug}}"
    uploadMedia: "content: upload image {{path}}"
    deleteMedia: "content: delete image {{path}}"

media_folder: "images/uploads"
public_folder: "images/uploads"

site_url: https://sportexproduction.com
display_url: https://sportexproduction.com
logo_url: https://sportexproduction.com/favicon.svg

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    description: "Manage product catalog — add, edit, or remove products"
    editor:
      preview: false
    files:
      - name: "products_data"
        label: "Product Catalog"
        file: "data/products.json"
        description: "Edit the product list"
        fields:
          - name: "products_list"
            label: "Products"
            label_singular: "Product"
            widget: "list"
            summary: "{{id}} — {{name}}"
            fields:
              - { name: "id", label: "Product ID", widget: "string", hint: "Unique ID like 'm-01' or 'w-03'" }
              - { name: "name", label: "Product Name", widget: "string" }
              - { name: "category", label: "Category", widget: "select", options: ["men", "women"] }
              - { name: "tags", label: "Tags", widget: "string", hint: "e.g. 'Quick-Dry · UPF 50+'" }
              - { name: "thumbnail", label: "Thumbnail Image", widget: "image", hint: "Product card image (600px wide)" }
              - name: "images"
                label: "Gallery Images"
                label_singular: "Image"
                widget: "list"
                summary: "{{fields.url}}"
                fields:
                  - { name: "url", label: "Image URL", widget: "image" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "features"
                label: "Features"
                label_singular: "Feature"
                widget: "list"
                summary: "{{fields.text}}"
                fields:
                  - { name: "text", label: "Feature", widget: "string" }
              - { name: "fabric", label: "Fabric", widget: "string" }
              - { name: "sizes", label: "Available Sizes", widget: "string" }
              - { name: "moq", label: "MOQ", widget: "string" }
              - { name: "care", label: "Care Instructions", widget: "string" }

  - name: "company"
    label: "Company Info"
    description: "Edit company details, contact info, and descriptions"
    editor:
      preview: false
    files:
      - name: "company_data"
        label: "Company Information"
        file: "data/company.json"
        fields:
          - { name: "name", label: "Brand Name", widget: "string" }
          - { name: "fullName", label: "Full Company Name", widget: "string" }
          - { name: "address", label: "Address (English)", widget: "string" }
          - { name: "addressZh", label: "Address (Chinese)", widget: "string" }
          - { name: "email", label: "Contact Email", widget: "string" }
          - { name: "phone", label: "Contact Phone", widget: "string" }
          - { name: "tagline", label: "Footer Tagline (English)", widget: "string" }
          - { name: "taglineZh", label: "Footer Tagline (Chinese)", widget: "string" }
          - { name: "description", label: "Company Description (English)", widget: "markdown" }
          - { name: "descriptionZh", label: "Company Description (Chinese)", widget: "markdown" }
          - { name: "mission", label: "Mission Statement (English)", widget: "text" }
          - { name: "missionZh", label: "Mission Statement (Chinese)", widget: "text" }

  - name: "pages"
    label: "Pages"
    description: "Edit static page content and hero banners"
    editor:
      preview: false
    files:
      - name: "home"
        label: "Home Page"
        file: "data/pages/home.json"
        fields:
          - name: "hero_image"
            label: "Hero Background Image"
            widget: "image"
            hint: "Main hero banner image (1920px wide recommended)"
          - name: "men_hero_image"
            label: "Men's Page Hero Image"
            widget: "image"
          - name: "women_hero_image"
            label: "Women's Page Hero Image"
            widget: "image"
