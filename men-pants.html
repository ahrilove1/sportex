<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men's Pants | SPORTEX</title>
<meta name="description" content="SPORTEX Men's Outdoor Pants">
<link rel="icon" href="favicon.svg">
<style>
:root{--navy:#1a1f2e;--navy-light:#2a3348;--white:#fff;--off-white:#f5f4f1;--gray:#6b7280;--gray-light:#e5e7eb;--accent:#d4944e;--accent-dark:#b87830;--text:#1f2937}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--white);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.top-bar{background:var(--navy);color:var(--white);text-align:center;padding:8px 16px;font-size:13px;letter-spacing:.5px}
.nav{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-light);padding:0 40px;display:flex;justify-content:space-between;align-items:center;height:64px}
.nav-logo{font-size:22px;font-weight:700;letter-spacing:3px;color:var(--navy);text-decoration:none}
.nav-links{display:flex;gap:36px;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:var(--text);font-size:14px;font-weight:500;letter-spacing:.5px;transition:color .2s}
.nav-links a:hover{color:var(--accent-dark)}
.nav-links a.active{color:var(--accent-dark);border-bottom:2px solid var(--accent-dark);padding-bottom:4px}
.lang-toggle button{background:none;border:1px solid var(--gray-light);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--gray);letter-spacing:.5px;transition:all .2s}
.lang-toggle button:hover{border-color:var(--accent-dark);color:var(--accent-dark)}
.page-hero{position:relative;height:45vh;min-height:360px;background:url('https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?w=1920&q=80') center 30%/cover no-repeat;display:flex;align-items:center;justify-content:center}
.page-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(26,31,46,.3),rgba(26,31,46,.6))}
.page-hero-content{position:relative;text-align:center;color:var(--white)}
.page-hero-content h1{font-size:clamp(32px,5vw,56px);font-weight:700;letter-spacing:4px;margin-bottom:8px}
.page-hero-content p{font-size:16px;opacity:.85;letter-spacing:2px}
.breadcrumb{max-width:1200px;margin:0 auto;padding:20px 40px;font-size:13px;color:var(--gray)}
.breadcrumb a{color:var(--gray);text-decoration:none}
.breadcrumb a:hover{color:var(--accent-dark)}
.breadcrumb span{color:var(--text)}
.cat-tabs{max-width:900px;margin:0 auto 40px;display:flex;gap:0;border-bottom:2px solid var(--gray-light)}
.cat-tabs a{flex:1;text-align:center;padding:14px;font-size:14px;font-weight:600;letter-spacing:1px;text-decoration:none;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.cat-tabs a:hover{color:var(--text)}
.cat-tabs a.active{color:var(--navy);border-bottom-color:var(--navy)}
.section{padding:0 40px 80px}
.section-header{text-align:center;margin-bottom:48px}
.section-header h2{font-size:clamp(26px,4vw,36px);font-weight:700;color:var(--navy);letter-spacing:2px;margin-bottom:8px}
.section-header p{color:var(--gray);font-size:15px;letter-spacing:1px}
.product-grid{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:32px}
.product-card{display:flex;gap:20px;align-items:center;background:var(--white);transition:transform .3s ease,box-shadow .3s ease}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.product-card .img-wrap{width:240px;height:320px;flex-shrink:0;overflow:hidden;background:var(--off-white)}
.product-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.product-card:hover .img-wrap img{transform:scale(1.04)}
.product-card .info{flex:1;padding:0}
.product-card .info .p-name{font-size:16px;font-weight:600;margin-bottom:6px}
.product-card .info .p-cat{font-size:13px;color:var(--gray);margin-bottom:12px}
.back-link{text-align:center;padding:0 40px 80px}
.back-link a{display:inline-block;padding:14px 36px;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:var(--navy);border:2px solid var(--navy);transition:all .3s}
.back-link a:hover{background:var(--navy);color:var(--white)}
.footer{background:var(--navy);color:var(--white);padding:64px 40px 40px}
.footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.12)}
.footer-col h4{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.footer-col p,.footer-col a{font-size:13px;color:rgba(255,255,255,.65);line-height:2.2;text-decoration:none;display:block}
.footer-col a:hover{color:var(--white)}
.footer-brand{font-size:22px;font-weight:700;letter-spacing:4px;margin-bottom:12px}
.footer-bottom{max-width:1100px;margin:0 auto;padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,.45)}
@media(max-width:768px){.product-card{flex-direction:column}.product-card .img-wrap{width:100%;height:auto;aspect-ratio:3/4}}
</style>
</head>
<body>
<header id="siteNav"></header>
<section class="page-hero"><div class="page-hero-content"><h1>MEN'S PANTS</h1><p>Trousers & Shorts &mdash; Quick-Dry, Stretch Comfort</p></div></section>
<div class="breadcrumb"><a href="index">Home</a> / <a href="men">Men</a> / <span>Pants</span></div>
<section class="section">
<div class="cat-tabs"><a href="men-shirts">Shirts</a><a href="men-pants" class="active">Pants</a></div>
<div class="product-grid" id="productGrid"></div>
</section>
<div class="back-link"><a href="men">&larr; Back to Men</a></div>
<footer id="siteFooter" class="footer"></footer>
<script src="products.js"></script>
<script src="common.js"></script>
<script src="lang.js"></script>
<script>
function isPants(p){var n=(p.name||'').toLowerCase();var t=(p.tags||'').toLowerCase();return /pants|trouser|chino|short|cargo|jean/.test(n)||/pants/.test(t);}
function isShirt(p){var n=(p.name||'').toLowerCase();var t=(p.tags||'').toLowerCase();return /shirt|polo|windbreaker|jacket|top/.test(n)||/shirt/.test(t)||/shirts/.test(t);}
(async function(){
try{
var r=await fetch('data/products.json');var d=await r.json();var all=d.products_list||[];
var men=all.filter(function(p){return p.category==='men';});
var products=men.filter(function(p){return isPants(p)||(!isPants(p)&&!isShirt(p));});
try{var cr=await fetch('/api/data/company');if(cr.ok)COMPANY=await cr.json();}catch(e){}
renderNav('men');renderFooter();
var g=document.getElementById('productGrid');
if(!products.length){g.innerHTML='<p style="text-align:center;color:var(--gray);padding:40px">No pants yet.</p>';return;}
products.forEach(function(p){
 var c=document.createElement('a');c.className='product-card';c.href='product?id='+p.id;
 c.style.textDecoration='none';c.style.color='inherit';c.style.display='flex';
 c.innerHTML='<div class="img-wrap">'+imgTag(p.thumbnail,p.name,'','card')+'</div><div class="info"><div class="p-name">'+p.name+'</div><div class="p-cat">'+p.tags+'</div><p style="font-size:13px;color:var(--gray);line-height:1.7;margin-top:8px">'+(p.description||'')+'</p></div>';
 g.appendChild(c);
});
}catch(e){document.getElementById('productGrid').innerHTML='<p style="text-align:center;color:red;padding:40px">'+e.stack+'</p>';}
})();
</script>
</body>
</html>
