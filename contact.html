<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | SPORTEX</title>
<meta name="description" content="Contact SPORTEX — premium outdoor resort wear manufacturer based in Nanjing, China. Get in touch for OEM/ODM inquiries and partnership opportunities.">
<meta property="og:title" content="Contact | SPORTEX">
<meta property="og:description" content="Get in touch with SPORTEX for premium outdoor resort wear manufacturing.">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.svg">
<style>
  :root {
    --navy: #1a1f2e; --navy-light: #2a3348;
    --white: #ffffff; --off-white: #f5f4f1;
    --gray: #6b7280; --gray-light: #e5e7eb;
    --accent: #d4944e; --accent-dark: #b87830;
    --text: #1f2937;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--white); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    background: var(--navy); color: var(--white);
    text-align: center; padding: 8px 16px;
    font-size: 13px; letter-spacing: 0.5px;
  }

  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--gray-light);
    padding: 0 40px; display: flex; justify-content: space-between;
    align-items: center; height: 64px;
  }
  .nav-logo {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    color: var(--navy); text-decoration: none;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--text); font-size: 14px;
    font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent-dark); }
  .nav-links a.active { color: var(--accent-dark); border-bottom: 2px solid var(--accent-dark); padding-bottom: 4px; }
  .lang-toggle button {
    background: none; border: 1px solid var(--gray-light);
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    color: var(--gray); letter-spacing: 0.5px; transition: all 0.2s;
  }
  .lang-toggle button:hover { border-color: var(--accent-dark); color: var(--accent-dark); }

  .page-hero {
    position: relative; height: 35vh; min-height: 280px;
    background: var(--navy-light);
    display: flex; align-items: center; justify-content: center;
  }
  .page-hero-content { text-align: center; color: var(--white); }
  .page-hero-content h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
  .page-hero-content p { font-size: 16px; opacity: 0.8; letter-spacing: 2px; }

  .breadcrumb {
    max-width: 1200px; margin: 0 auto; padding: 20px 40px;
    font-size: 13px; color: var(--gray);
  }
  .breadcrumb a { color: var(--gray); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent-dark); }
  .breadcrumb span { color: var(--text); }

  .section { padding: 0 40px 80px; }
  .contact-wrap {
    max-width: 800px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
  }
  .contact-wrap h2 {
    font-size: 22px; font-weight: 700; color: var(--navy);
    letter-spacing: 2px; margin-bottom: 32px;
    grid-column: 1 / -1;
  }
  .contact-card {
    background: var(--off-white); padding: 32px; border-radius: 2px;
  }
  .contact-card h3 {
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gray); margin-bottom: 8px;
  }
  .contact-card .info-value {
    font-size: 16px; color: var(--text); line-height: 1.8;
  }
  .contact-card .info-value a {
    color: var(--accent-dark); text-decoration: none;
  }
  .contact-card .info-value a:hover { text-decoration: underline; }

  .back-link {
    text-align: center; padding: 0 40px 80px;
  }
  .back-link a {
    display: inline-block; padding: 14px 36px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; text-decoration: none;
    color: var(--navy); border: 2px solid var(--navy);
    transition: all 0.3s;
  }
  .back-link a:hover { background: var(--navy); color: var(--white); }

  .footer { background: var(--navy); color: var(--white); padding: 64px 40px 40px; }
  .footer-grid {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .footer-col h4 { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .footer-col p, .footer-col a { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 2.2; text-decoration: none; display: block; }
  .footer-col a:hover { color: var(--white); }
  .footer-brand { font-size: 22px; font-weight: 700; letter-spacing: 4px; margin-bottom: 12px; }
  .footer-bottom {
    max-width: 1100px; margin: 0 auto; padding-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: rgba(255,255,255,0.45);
  }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header id="siteNav"></header>

<section class="page-hero">
  <div class="page-hero-content">
    <h1 data-lkey="contactHeroTitle">CONTACT US</h1>
    <p data-lkey="contactHeroSub">Get in touch with SPORTEX</p>
  </div>
</section>

<div class="breadcrumb">
  <a href="index.html">Home</a> / <span>Contact</span>
</div>

<section class="section">
  <div class="contact-wrap reveal">
    <h2 data-lkey="contactInfoTitle">Company Information</h2>
    <div class="contact-card">
      <h3 data-lkey="contactAddressLabel">Address</h3>
      <div class="info-value" data-lkey="contactAddress">Nanjing, Jiangsu, China</div>
    </div>
    <div class="contact-card">
      <h3 data-lkey="contactEmailLabel">Email</h3>
      <div class="info-value"><a href="mailto:info@sportex.com" data-lkey="contactEmail">info@sportex.com</a></div>
    </div>
    <div class="contact-card">
      <h3 data-lkey="contactPhoneLabel">Phone</h3>
      <div class="info-value" data-lkey="contactPhone">+86 25 XXXX XXXX</div>
    </div>
  </div>
</section>

<div class="back-link reveal">
  <a href="index.html" data-lkey="backHome">&larr; Back to Home</a>
</div>

<footer id="siteFooter" class="footer"></footer>

<script src="common.js"></script>
<script src="lang.js"></script>
<script>
(async () => {
await companyLoaded;
renderNav('contact');
renderFooter();

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
