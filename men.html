<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men's Collection | SPORTEX</title>
<meta name="description" content="SPORTEX Men's Outdoor Resort Wear — lightweight, breathable shirts, trousers, and outerwear with UPF 50+ protection for warm climates.">
<meta property="og:title" content="Men's Collection | SPORTEX">
<meta property="og:description" content="Lightweight outdoor shirts and resort wear engineered for warm climates. UPF 50+, antibacterial, quick-dry.">
<meta property="og:type" content="website">
<link rel="icon" href="favicon.svg">
<style>
  :root {
    --navy: #1a1f2e; --navy-light: #2a3348;
    --white: #ffffff; --off-white: #f5f4f1;
    --gray: #6b7280; --gray-light: #e5e7eb;
    --accent: #d4944e; --accent-dark: #b87830;
    --text: #1f2937;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--white); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    background: var(--navy); color: var(--white);
    text-align: center; padding: 8px 16px;
    font-size: 13px; letter-spacing: 0.5px;
  }

  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--gray-light);
    padding: 0 40px; display: flex; justify-content: space-between;
    align-items: center; height: 64px;
  }
  .nav-logo {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    color: var(--navy); text-decoration: none;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--text); font-size: 14px;
    font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent-dark); }
  .nav-links a.active { color: var(--accent-dark); border-bottom: 2px solid var(--accent-dark); padding-bottom: 4px; }
  .lang-toggle button {
    background: none; border: 1px solid var(--gray-light);
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    color: var(--gray); letter-spacing: 0.5px; transition: all 0.2s;
  }
  .lang-toggle button:hover { border-color: var(--accent-dark); color: var(--accent-dark); }

  .page-hero {
    position: relative; height: 45vh; min-height: 360px;
    background: url('https://images.unsplash.com/photo-1488161628813-04466f872be2?w=1920&q=80') center 30%/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
  }
  .page-hero::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(26,31,46,0.3), rgba(26,31,46,0.6));
  }
  .page-hero-content { position: relative; text-align: center; color: var(--white); }
  .page-hero-content h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
  .page-hero-content p { font-size: 16px; opacity: 0.85; letter-spacing: 2px; }

  .breadcrumb {
    max-width: 1200px; margin: 0 auto; padding: 20px 40px;
    font-size: 13px; color: var(--gray);
  }
  .breadcrumb a { color: var(--gray); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent-dark); }
  .breadcrumb span { color: var(--text); }

  .section { padding: 0 40px 80px; }
  .section-header { text-align: center; margin-bottom: 48px; }
  .section-header h2 { font-size: clamp(26px, 4vw, 36px); font-weight: 700; color: var(--navy); letter-spacing: 2px; margin-bottom: 8px; }
  .section-header p { color: var(--gray); font-size: 15px; letter-spacing: 1px; }

  .product-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .product-card {
    background: var(--white); transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.08);
  }
  .product-card .img-wrap {
    width: 100%; aspect-ratio: 3/4; overflow: hidden; background: var(--off-white);
  }
  .product-card .img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
  }
  .product-card:hover .img-wrap img { transform: scale(1.04); }
  .product-card .info { padding: 16px; }
  .product-card .info .p-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; margin-bottom: 2px; }
  .product-card .info .p-cat { font-size: 12px; color: var(--gray); letter-spacing: 0.5px; }

  .back-link {
    text-align: center; padding: 0 40px 80px;
  }
  .back-link a {
    display: inline-block; padding: 14px 36px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; text-decoration: none;
    color: var(--navy); border: 2px solid var(--navy);
    transition: all 0.3s;
  }
  .back-link a:hover { background: var(--navy); color: var(--white); }

  .footer { background: var(--navy); color: var(--white); padding: 64px 40px 40px; }
  .footer-grid {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .footer-col h4 { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
  .footer-col p, .footer-col a { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 2.2; text-decoration: none; display: block; }
  .footer-col a:hover { color: var(--white); }
  .footer-brand { font-size: 22px; font-weight: 700; letter-spacing: 4px; margin-bottom: 12px; }
  .footer-bottom {
    max-width: 1100px; margin: 0 auto; padding-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: rgba(255,255,255,0.45);
  }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header id="siteNav"></header>

<section class="page-hero">
  <div class="page-hero-content">
    <h1 data-lkey="menHeroTitle">MEN'S COLLECTION</h1>
    <p data-lkey="menHeroSub">Outdoor Shirts & Resort Wear</p>
  </div>
</section>

<div class="breadcrumb">
  <a href="index.html">Home</a> / <span data-lkey="menBreadcrumb">Men's Collection</span>
</div>

<section class="section">
  <div class="section-header reveal">
    <h2 data-lkey="menSectionTitle">Men's Outdoor Resort Wear</h2>
    <p data-lkey="menSectionSub">Lightweight, breathable designs engineered for warm climates</p>
  </div>
  <div class="product-grid" id="productGrid"></div>
</section>

<div class="back-link reveal">
  <a href="index.html" data-lkey="backHome">&larr; Back to Home</a>
</div>

<footer id="siteFooter" class="footer"></footer>

<script src="products.js"></script>
<script src="common.js"></script>
<script src="lang.js"></script>
<script>
(async () => {
await Promise.all([productsLoaded, companyLoaded]);
renderNav('men');
renderFooter();

const grid = document.getElementById('productGrid');
getProductsByCategory('men').forEach((p) => {
  const card = document.createElement('a');
  card.className = 'product-card reveal';
  card.href = 'product.html?id=' + p.id;
  card.style.textDecoration = 'none';
  card.style.color = 'inherit';
  card.style.display = 'block';
  card.innerHTML = `
    <div class="img-wrap">
      ${imgTag(p.thumbnail, p.name)}
    </div>
    <div class="info">
      <div class="p-name">${p.name}</div>
      <div class="p-cat">${p.tags}</div>
    </div>
  `;
  grid.appendChild(card);
});

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
